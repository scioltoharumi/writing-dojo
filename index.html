<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Writing Dojo — 小説執筆力トレーニング</title>
<link rel="stylesheet" href="style.css?v=20260712-2" id="baseStylesheet">
</head>
<body>
<header class="app-header">
  <h1>Writing Dojo</h1>
  <button id="growthLogToggle" class="ghost-button" type="button">成長記録</button>
</header>

<nav id="categoryNav" class="category-nav" aria-label="カテゴリ選択"></nav>

<main id="problemView" class="problem-view"></main>

<section id="growthLogView" class="growth-log-view" hidden>
  <h2>成長記録：過去の回答と気づきメモ</h2>
  <p class="hint">これまでの回答と、回答例を見た後に記録した「気づきメモ」を、日付・カテゴリ横断で振り返るページです。</p>
  <div id="growthLogList" class="growth-log-list"></div>
</section>

<footer class="app-footer">
  <p>
    本サイトの一部の設問・引用は『無職転生 〜異世界行ったら本気だす〜』（作: 理不尽な孫の手、
    <a href="https://ncode.syosetu.com/n9669bk/" target="_blank" rel="noopener">https://ncode.syosetu.com/n9669bk/</a>）
    を題材にしています。引用範囲についてご指摘があればご連絡ください。
  </p>
  <p><span id="appVersion"></span></p>
</footer>

<script>
// キャッシュ迂回ブートストラップ:
// HTML自体が古いキャッシュでも、version.json を毎回オリジンから取得し、
// その番号付きURLで最新の app.js / style.css を読み込む。
(function () {
  function load(version) {
    var link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = "style.css?v=" + encodeURIComponent(version);
    document.head.appendChild(link);
    var script = document.createElement("script");
    script.src = "app.js?v=" + encodeURIComponent(version);
    document.body.appendChild(script);
  }
  fetch("version.json?_=" + Date.now(), { cache: "no-store" })
    .then(function (res) { return res.json(); })
    .then(function (json) {
      load(json.version);
      var el = document.getElementById("appVersion");
      if (el) el.textContent = "version " + json.version;
    })
    .catch(function () {
      // 取得失敗時（オフライン等）はキャッシュ済みでも動くようそのまま読み込む
      load("fallback");
    });
})();
</script>
</body>
</html>
